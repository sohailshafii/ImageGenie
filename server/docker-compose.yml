# Local pipeline (milestones 2 + 4): Postgres + Pub/Sub emulator + one worker per
# stage (download → convert → normalize → render). `make compose-up` builds and
# starts it; `make compose-seed` publishes download jobs that then flow through
# every stage; `make compose-down` tears it down. Exercises the same worker code
# that runs on Cloud Run against managed Pub/Sub + Cloud SQL.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: imagegenie
      POSTGRES_PASSWORD: imagegenie
      POSTGRES_DB: imagegenie
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imagegenie"]
      interval: 2s
      timeout: 3s
      retries: 30

  pubsub:
    image: messagebird/gcloud-pubsub-emulator:latest
    environment:
      PUBSUB_PROJECT1: imagegenie-local  # emulator serves this project on :8681

  # download → convert → normalize → render: one service per stage, all sharing
  # the same image (CMD picks the worker), the storage volume, DB, and emulator.
  worker:
    # Repo-root context so the multi-stage build can reach web/ (the SPA build);
    # the Dockerfile lives in server/. All stage services share this build.
    build: &build
      context: ..
      dockerfile: server/Dockerfile
    restart: on-failure  # retry until the emulator/DB are ready
    environment: &worker-env
      PUBSUB_EMULATOR_HOST: pubsub:8681
      IMAGEGENIE_DATABASE_URL: postgresql+psycopg://imagegenie:imagegenie@postgres:5432/imagegenie
      IMAGEGENIE_STORAGE_ROOT: /data/storage
      # Local stack only: let a worker materialize the schema on a fresh volume
      # so `make compose-up` needs no separate migration step. Cloud leaves this
      # off and runs `alembic upgrade head` at deploy (server.md#migrations).
      IMAGEGENIE_AUTO_CREATE_SCHEMA: "true"
    volumes: &worker-volumes
      - storage:/data/storage
    depends_on: &worker-deps
      postgres:
        condition: service_healthy
      pubsub:
        condition: service_started

  convert:
    build: *build
    restart: on-failure
    command: python -m app.workers.convert
    environment: *worker-env
    volumes: *worker-volumes
    depends_on: *worker-deps

  normalize:
    build: *build
    restart: on-failure
    command: python -m app.workers.normalize
    environment: *worker-env
    volumes: *worker-volumes
    depends_on: *worker-deps

  render:
    build: *build
    restart: on-failure
    command: python -m app.workers.render
    environment: *worker-env
    volumes: *worker-volumes
    depends_on: *worker-deps

  # Producer — run on demand via `make compose-seed` (profile keeps it off `up`).
  seed:
    build: *build
    profiles: ["seed"]
    environment: *worker-env
    volumes:
      - storage:/data/storage
    depends_on:
      postgres:
        condition: service_healthy
      pubsub:
        condition: service_started

volumes:
  storage:
